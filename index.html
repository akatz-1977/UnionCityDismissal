<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#1f4f8a"><link rel="manifest" href="manifest.webmanifest"><link rel="stylesheet" href="styles.css"><title>Student Pickup Numbers</title></head><body><header><div><h1>Student Pickup Numbers</h1><p>Numbers stay until marked done</p></div><button id="modeBtn" class="secondary">Display Mode</button></header><main><section id="callerView"><div class="card"><label>Enter pickup number</label><div class="entry"><input id="numberInput" inputmode="numeric" placeholder="Example: 142"><button id="callBtn">Call Number</button></div><div class="actions"><button id="undoBtn" class="secondary">Undo Last</button><button id="clearBtn" class="danger">Clear All</button></div></div><div class="card"><div class="title"><h2>Active Numbers</h2><span id="countBadge">0 active</span></div><div id="activeList"></div></div><div class="card"><h2>Recently Completed</h2><div id="historyList" class="history"></div></div></section><section id="displayView" hidden><div class="toolbar"><button id="backBtn" class="secondary">Back</button><button id="fullscreenBtn">Full Screen</button><label><input id="soundToggle" type="checkbox" checked> Sound</label></div><div id="displayBoard" class="board"></div><div class="footer">Please report for pickup when your number appears.</div></section></main><script src="app.js"></script></body></html>
